events {
    worker_connections 1024;
}

http {
    # Увеличиваем таймаут для SignalR WebSocket
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 10s;

    server {
        listen 80;
        server_name _;

        # Редирект на HTTPS (раскомментировать после получения сертификата)
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://app:8080;
            proxy_http_version 1.1;

            # Обязательно для SignalR / WebSocket
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Буфер для загрузки файлов до 50 МБ
            client_max_body_size 50m;
        }
    }

    # ── HTTPS (заполнить после certbot) ────────────────────────────────────────
    # server {
